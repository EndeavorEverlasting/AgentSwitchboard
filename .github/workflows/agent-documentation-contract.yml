name: Agent documentation contract

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "CLAUDE.md"
      - "SKILLS.md"
      - "CAPABILITIES.md"
      - "TRIGGERS.md"
      - ".ai/**"
      - "docs/governance/**"
      - "templates/repository-agent-contract/**"
      - "scripts/Test-AgentDocumentationContract.ps1"
      - "scripts/Test-AgentGovernanceDoctrine.ps1"
      - "scripts/Test-HarnessDoctrineContract.ps1"
      - "scripts/Test-EndToEndRuntimeValidationSkill.ps1"
      - ".github/workflows/agent-documentation-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Parse contract JSON
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          for path in (
              Path('.ai/agent-contract.json'),
              Path('.ai/harness/harness-doctrine.policy.json'),
              Path('templates/repository-agent-contract/.ai/agent-contract.json'),
              Path('templates/repository-agent-contract/.ai/harness/harness-doctrine.policy.json'),
          ):
              json.loads(path.read_text(encoding='utf-8-sig'))
              print(f'PASS: {path}')
          PY
      - name: Run governance doctrine contract
        shell: pwsh
        run: ./scripts/Test-AgentGovernanceDoctrine.ps1
      - name: Run harness doctrine contract
        shell: pwsh
        run: ./scripts/Test-HarnessDoctrineContract.ps1
      - name: Run end-to-end runtime skill contract
        shell: pwsh
        run: ./scripts/Test-EndToEndRuntimeValidationSkill.ps1
      - name: Run documentation contract
        shell: pwsh
        run: ./scripts/Test-AgentDocumentationContract.ps1
      - name: Check repository hygiene
        shell: bash
        run: |
          set -o pipefail
          log="$RUNNER_TEMP/agent-documentation-linux-hygiene.log"
          {
            set -x
            if [[ -n "${GITHUB_BASE_REF:-}" ]]; then
              git diff --check "origin/${GITHUB_BASE_REF}...HEAD"
            else
              git diff --check HEAD^
            fi
            status="$(git status --short)"
            printf 'git status --short:\n%s\n' "$status"
            test -z "$status"
          } 2>&1 | tee "$log"
      - name: Upload Linux diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-documentation-linux-contract
          path: ${{ runner.temp }}/agent-documentation-linux-hygiene.log
          if-no-files-found: ignore

  windows-contracts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Parse PowerShell validators
        shell: pwsh
        run: |
          $failures = [System.Collections.Generic.List[string]]::new()
          foreach ($path in @(
            'scripts/Test-AgentDocumentationContract.ps1',
            'scripts/Test-AgentGovernanceDoctrine.ps1',
            'scripts/Test-HarnessDoctrineContract.ps1',
            'scripts/Test-EndToEndRuntimeValidationSkill.ps1'
          )) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($path, [ref]$tokens, [ref]$errors)
            foreach ($error in @($errors)) { $failures.Add("$path`: $($error.Message)") }
          }
          if ($failures.Count -gt 0) {
            $failures | ForEach-Object { Write-Error $_ }
            exit 1
          }
      - name: Run governance doctrine contract
        shell: pwsh
        run: |
          ./scripts/Test-AgentGovernanceDoctrine.ps1 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\agent-governance-doctrine.log"
      - name: Run harness doctrine contract
        shell: pwsh
        run: |
          ./scripts/Test-HarnessDoctrineContract.ps1 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\harness-doctrine-contract.log"
      - name: Run end-to-end runtime skill contract
        shell: pwsh
        run: |
          ./scripts/Test-EndToEndRuntimeValidationSkill.ps1 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\end-to-end-runtime-validation-skill.log"
      - name: Run documentation contract
        shell: pwsh
        run: |
          ./scripts/Test-AgentDocumentationContract.ps1 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\agent-documentation-contract.log"
      - name: Verify clean checkout
        shell: pwsh
        run: |
          if ($env:GITHUB_BASE_REF) { git diff --check "origin/$env:GITHUB_BASE_REF...HEAD" }
          else { git diff --check HEAD^ }
          if (git status --short) { throw 'Checkout is dirty after validation.' }
      - name: Upload contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-documentation-contract
          path: |
            ${{ runner.temp }}/agent-governance-doctrine.log
            ${{ runner.temp }}/agent-documentation-contract.log
            ${{ runner.temp }}/harness-doctrine-contract.log
            ${{ runner.temp }}/end-to-end-runtime-validation-skill.log
          if-no-files-found: ignore
