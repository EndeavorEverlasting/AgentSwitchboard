name: App harness validation

on:
  pull_request:
    paths:
      - 'Test-AppHarness.cmd'
      - 'scripts/Test-AppHarness.ps1'
      - 'tests/test_app_harness_validator.py'
      - '.ai/harness/app-composition.graph.json'
      - '.ai/harness/app-harness-report.template.md'
      - '.ai/harness/manifest.json'
      - '.ai/harness/artifact-registry.json'
      - '.ai/harness/schemas/app-composition-graph.schema.json'
      - '.ai/harness/schemas/app-harness-validation.schema.json'
      - 'CAPABILITIES.md'
      - 'TRIGGERS.md'
      - 'plans/**'
      - '.github/workflows/app-harness-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-offline-harness:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse aggregate validator
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Join-Path $PWD 'scripts/Test-AppHarness.ps1'),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) { throw ($errors -join [Environment]::NewLine) }

      - name: Run one-command offline harness proof
        shell: pwsh
        run: |
          $output = Join-Path $env:RUNNER_TEMP 'app-harness-windows'
          & .\scripts\Test-AppHarness.ps1 -OutputRoot $output
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $result = Get-Content -LiteralPath (Join-Path $output 'app-harness-validation.json') -Raw | ConvertFrom-Json
          if ($result.summary.failed -ne 0) { throw 'aggregate harness reported failures' }
          if (@($result.checks | Where-Object status -eq 'SKIP').Count -lt 1) { throw 'expected honest optional dependency skip' }
          if ($result.proofLevel -ne 'offline-synthetic-harness') { throw 'proof level inflated' }
          if ($result.runContext.networkAllowed -or $result.runContext.runtimeAllowed -or $result.runContext.mutationAllowed) { throw 'unsafe run context' }

      - name: Run dependency-free static contracts
        run: python tests/test_app_harness_validator.py

      - name: Verify checkout remains clean
        shell: pwsh
        run: |
          $dirty = git status --porcelain=v1
          if ($dirty) { throw "validator mutated checkout:`n$dirty" }

  linux-offline-harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run dependency-free static contracts
        run: python3 tests/test_app_harness_validator.py

      - name: Run aggregate observer
        shell: pwsh
        run: |
          $output = Join-Path $env:RUNNER_TEMP 'app-harness-linux'
          & ./scripts/Test-AppHarness.ps1 -OutputRoot $output
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $jsonPath = Join-Path $output 'app-harness-validation.json'
          $reportPath = Join-Path $output 'app-harness-validation.md'
          if (-not (Test-Path -LiteralPath $jsonPath -PathType Leaf)) { throw 'JSON result missing' }
          if (-not (Test-Path -LiteralPath $reportPath -PathType Leaf)) { throw 'English report missing' }
          $report = Get-Content -LiteralPath $reportPath -Raw
          foreach ($token in @('# APP HARNESS VALIDATION', '[PASS] required files', '[SKIP] optional MCP symbol smoke: lsp_project_not_loaded', 'Result:', 'no runtime')) {
            if (-not $report.Contains($token)) { throw "report token missing: $token" }
          }

      - name: Full PR-range hygiene
        shell: bash
        run: |
          git diff --check "origin/${{ github.base_ref }}...HEAD"
          test -z "$(git status --porcelain=v1)"
