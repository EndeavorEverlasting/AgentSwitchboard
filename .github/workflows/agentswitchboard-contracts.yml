name: AgentSwitchboard contracts

"on":
  pull_request:
    paths:
      - ".github/workflows/agentswitchboard-contracts.yml"
      - "agentswitchboard/**"
      - "fixtures/**"
      - "schemas/**"
      - "tests/**"
      - "tooling/wsl/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python contract dependencies
        run: python -m pip install --disable-pip-version-check pytest jsonschema

      - name: Run Python contracts
        run: python -m pytest -q

      - name: Parse Bash entrypoints
        run: |
          bash -n tooling/wsl/scripts/bootstrap-agent-workstation.sh
          bash -n tooling/wsl/scripts/install-agent-wrappers.sh
          bash -n tooling/wsl/templates/agent-wrapper.sh

  powershell-contracts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run WSL bootstrap contracts
        shell: pwsh
        run: ./tooling/wsl/Test-WslBootstrapContracts.ps1

      - name: Run WSL repository path contracts
        shell: pwsh
        run: ./tooling/wsl/Test-WslRepositoryPathContracts.ps1
