name: App output context engine

on:
  pull_request:
    paths:
      - 'Contextualize-AppOutput.cmd'
      - 'tooling/context/**'
      - 'tests/test_app_output_context_engine.py'
      - '.ai/harness/fixtures/app-output-context/**'
      - '.ai/harness/schemas/app-output-context.schema.json'
      - '.ai/harness/workflows/app-output-contextualization.workflow.json'
      - '.ai/skills/app-output-contextualization/**'
      - 'scripts/Test-AppOutputContextEngine.ps1'
      - 'docs/harness/app-output-context-engine.md'
      - 'SKILLS.md'
      - 'CAPABILITIES.md'
      - 'TRIGGERS.md'
      - 'CODEBASE_MAP.md'
      - '.ai/agent-contract.json'
      - '.ai/harness/manifest.json'
      - '.ai/harness/artifact-registry.json'
      - '.ai/harness/app-composition.graph.json'
      - 'plans/**'
      - '.github/workflows/app-output-context-engine.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Parse PowerShell validator
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Join-Path $PWD 'scripts/Test-AppOutputContextEngine.ps1'),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) { throw ($errors -join [Environment]::NewLine) }

      - name: Run focused contract
        shell: pwsh
        run: |
          & ./scripts/Test-AppOutputContextEngine.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Validate JSON documents
        shell: bash
        run: |
          python -m json.tool .ai/harness/schemas/app-output-context.schema.json >/dev/null
          python -m json.tool .ai/harness/workflows/app-output-contextualization.workflow.json >/dev/null
          python -m json.tool .ai/harness/fixtures/app-output-context/prompt-registry.fixture.json >/dev/null

      - name: Run aggregate app harness
        shell: pwsh
        run: |
          $output = Join-Path $env:RUNNER_TEMP 'app-output-context-aggregate'
          & ./scripts/Test-AppHarness.ps1 -OutputRoot $output
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Full PR-range hygiene
        shell: bash
        run: |
          git diff --check "origin/${{ github.base_ref }}...HEAD"
          test -z "$(git status --porcelain=v1)"
