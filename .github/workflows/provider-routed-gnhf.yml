name: Provider-routed GNHF contracts

on:
  pull_request:
    paths:
      - "tooling/gnhf/**"
      - ".ai/skills/gnhf-prompt-compilation/**"
      - ".ai/harness/schemas/gnhf-runtime-capability.schema.json"
      - ".ai/harness/artifact-registry.json"
      - ".ai/harness/manifest.json"
      - "Repair-ProviderRoutedGnhf.cmd"
      - ".github/workflows/provider-routed-gnhf.yml"
  push:
    branches: [main]
    paths:
      - "tooling/gnhf/**"
      - ".ai/skills/gnhf-prompt-compilation/**"
      - ".ai/harness/schemas/gnhf-runtime-capability.schema.json"
      - ".ai/harness/artifact-registry.json"
      - ".ai/harness/manifest.json"
      - "Repair-ProviderRoutedGnhf.cmd"

jobs:
  windows-provider-route:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate provider-routed GNHF contracts
        shell: pwsh
        run: |
          Set-Location -LiteralPath $env:GITHUB_WORKSPACE
          pwsh -NoLogo -NoProfile -File .\tooling\gnhf\tests\Test-ProviderRoutedGnhfContracts.ps1

  linux-static-floor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Reject machine-specific and secret-shaped runtime content
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          runtime_files=(
            tooling/gnhf/Gnhf.Process.ps1
            tooling/gnhf/Gnhf.Capability.ps1
            tooling/gnhf/Start-ProviderRoutedGnhfSprint.ps1
            tooling/gnhf/Install-ProviderRoutedGnhf.ps1
            Repair-ProviderRoutedGnhf.cmd
          )
          ! grep -InE 'C:\\Users\\[^$%{<]' "${runtime_files[@]}"
          ! grep -InE 'DEEPSEEK_API_KEY|sk-[A-Za-z0-9_-]{16,}' "${runtime_files[@]}"
          git diff --check
