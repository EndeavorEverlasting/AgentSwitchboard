# AgentSwitchboard managed tmux configuration
# This file is installed by the WSL workstation bootstrap.
# Back up your existing configuration before applying.

set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse on
set -g history-limit 50000

set -sg escape-time 0
set -g focus-events on

set -g status-style "bg=colour235,fg=colour248"
set -g status-left-length 40
set -g status-left "#[fg=colour214,bold] #S "
set -g status-right "#[fg=colour248] %H:%M #[fg=colour214]#h "

setw -g window-status-current-style "fg=colour214,bold"
setw -g window-status-current-format " #I:#W "

set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour214"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind c new-window -c "#{pane_current_path}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
